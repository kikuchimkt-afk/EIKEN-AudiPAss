<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudiPass — リスニング</title>
  <meta name="description" content="AudiPass - 英語資格試験リスニング問題の音声再生・解答・解説">
  <link rel="stylesheet" href="quiz.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="back-link" id="backLink">← AudiPass トップへ</a>
      <div class="header-title" id="headerTitle">AudiPass</div>
      <h1 class="header-subtitle" id="headerSubtitle">読み込み中...</h1>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs-container">
    <div class="tabs" id="tabsBar"></div>
  </div>

  <!-- Part Description -->
  <div class="part-info">
    <div class="part-description" id="partDescription"></div>
    <div class="full-audio-bar" id="fullAudioBar">
      <button class="full-audio-btn" id="fullAudioBtn">
        <span class="full-audio-icon">▶</span>
        <span class="full-audio-label">通し再生（本番形式）</span>
      </button>
      <div class="full-audio-progress" id="fullAudioProgress">
        <div class="full-audio-track">
          <div class="full-audio-fill" id="fullAudioFill"></div>
        </div>
        <span class="full-audio-time" id="fullAudioTime">0:00 / 0:00</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="score-display" id="scoreDisplay"></div>
    <div class="controls-right">
      <button class="control-btn" id="expandAllBtn">すべて開く</button>
      <button class="control-btn" id="collapseAllBtn">すべて閉じる</button>
      <button class="control-btn control-btn-accent" id="resetBtn">リセット</button>
    </div>
  </div>

  <!-- Questions -->
  <div class="questions-container" id="questionsContainer"></div>

  <script src="app.js"></script>
</body>

</html>
