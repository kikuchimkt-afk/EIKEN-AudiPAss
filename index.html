<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudiPass — リスニング練習</title>
  <meta name="description" content="AudiPass - 英語資格試験リスニング練習アプリ。各級の過去問題を音声再生・解答・解説付きで学習">
  <link rel="stylesheet" href="top.css">
</head>

<body>
  <div class="app-container">

    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <div class="hero-badge">LISTENING PRACTICE</div>
        <h1 class="hero-title">AudiPass</h1>
        <p class="hero-description">英語資格試験リスニング問題を音声付きで練習</p>
      </div>
    </header>

    <!-- Grade Selection -->
    <main class="main-content">
      <section class="section" id="gradeSection">
        <div class="section-header">
          <h2 class="section-title">レベルを選択</h2>
          <p class="section-subtitle">学習したいレベルを選んでください</p>
        </div>
        <div class="grade-grid" id="gradeGrid"></div>
      </section>

      <!-- Exam Selection (hidden initially) -->
      <section class="section exam-section hidden" id="examSection">
        <div class="section-header">
          <button class="breadcrumb-back" id="backToGrades">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            級の選択に戻る
          </button>
          <h2 class="section-title" id="examSectionTitle">試験を選択</h2>
          <p class="section-subtitle">実施年度と回を選んでください</p>
        </div>
        <div class="exam-list" id="examList"></div>
        <div class="no-exams hidden" id="noExams">
          <div class="no-exams-icon">📋</div>
          <p>この級のデータはまだ準備中です</p>
          <p class="no-exams-sub">今後追加予定です。しばらくお待ちください。</p>
        </div>
      </section>
    </main>

    <!-- Print Link -->
    <div
      style="text-align:center; padding: 24px 0 8px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
      <a href="print.html"
        style="display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:rgba(30,41,59,0.7); border:1px solid rgba(100,116,139,0.3); border-radius:12px; color:#94a3b8; text-decoration:none; font-size:14px; transition:all 0.2s;"
        onmouseover="this.style.borderColor='#60a5fa'; this.style.color='#e2e8f0';"
        onmouseout="this.style.borderColor='rgba(100,116,139,0.3)'; this.style.color='#94a3b8';">
        🖨️ 宿題プリント作成（先生用）
      </a>
      <a href="guide.html"
        style="display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.25); border-radius:12px; color:#818cf8; text-decoration:none; font-size:14px; font-weight:600; transition:all 0.2s;"
        onmouseover="this.style.background='rgba(99,102,241,.2)'; this.style.transform='translateY(-2px)';"
        onmouseout="this.style.background='rgba(99,102,241,.12)'; this.style.transform='none';">
        📖 使い方ガイド
      </a>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>AudiPass — Listening Practice</p>
    </footer>
  </div>

  <script src="top.js"></script>
</body>

</html>
